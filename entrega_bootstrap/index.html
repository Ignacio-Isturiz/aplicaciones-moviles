<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap 5.1</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Fira+Code&display=swap"
        rel="stylesheet">
    <!-- Bootstrap  -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/accordion.css">
    <link rel="stylesheet" href="css/alerts.css">
    <link rel="stylesheet" href="css/badge.css">
    <link rel="stylesheet" href="css/breadcrumb.css">
    <link rel="stylesheet" href="css/buttons.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
</head>

<body>

    <div class="container">
        <!-- Hero Section -->
        <header class="hero-section">
            <span class="badge-premium mb-3">JOSE IGNACIO ISTURIZ RABERT</span>
            <h1>Componentes Showcase</h1>
            <p class="lead text-secondary mx-auto" style="max-width: 700px;">
                Explorando el poder de Bootstrap 5.1: Acordeones y Alertas.
            </p>
        </header>

        <main id="main-content">
            <!-- Los componentes se cargarán dinámicamente aquí -->
            <div id="accordion-container"></div>
            <div id="alerts-container"></div>
            <div id="badge-container"></div>
            <div id="breadcrumb-container"></div>
            <div id="buttons-container"></div>
        </main>
    </div>

    <!-- Bootstrap 5.1 JS Bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom Loader Script -->
    <script>
        async function loadComponent(id, url) {
            try {
                const response = await fetch(url);
                const html = await response.text();
                document.getElementById(id).innerHTML = html;

                // Re-initialize any JS if needed for this component
                if (id === 'alerts-container') {
                    // Cargar alerts.js después de que el HTML esté en el DOM
                    const script = document.createElement('script');
                    script.src = 'js/alerts.js';
                    document.body.appendChild(script);
                }
            } catch (error) {
                console.error('Error cargando componente:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            loadComponent('accordion-container', 'components/accordion.html');
            loadComponent('alerts-container', 'components/alerts.html');
            loadComponent('badge-container', 'components/badge.html');
            loadComponent('breadcrumb-container', 'components/breadcrumb.html');
            loadComponent('buttons-container', 'components/buttons.html');
        });
    </script>
</body>

</html>
