<section class="buttons-container" id="buttons-section">
    <div class="buttons-section-title">
        <i class="bi bi-hand-index-thumb-fill"></i>
        <span>Componentes / Buttons</span>
    </div>

    <div class="button-example-grid">
        <!-- Standard Variants -->
        <div class="button-group-wrapper">
            <h6 class="mb-3 text-secondary small text-uppercase fw-bold">Variantes Estándar</h6>
            <div class="button-subset">
                <button type="button" class="btn btn-primary">Primary</button>
                <button type="button" class="btn btn-secondary">Secondary</button>
                <button type="button" class="btn btn-success">Success</button>
                <button type="button" class="btn btn-danger">Danger</button>
                <button type="button" class="btn btn-warning">Warning</button>
                <button type="button" class="btn btn-info">Info</button>
                <button type="button" class="btn btn-light">Light</button>
                <button type="button" class="btn btn-dark">Dark</button>
                <button type="button" class="btn btn-link">Enlace</button>
            </div>
        </div>

        <!-- Outline Variants -->
        <div class="button-group-wrapper">
            <h6 class="mb-3 text-secondary small text-uppercase fw-bold">Outline & Glass</h6>
            <div class="button-subset">
                <button type="button" class="btn btn-outline-primary">Outline Primary</button>
                <button type="button" class="btn btn-outline-secondary">Secondary</button>
                <button type="button" class="btn btn-outline-success">Success</button>
                <button type="button" class="btn btn-outline-danger">Danger</button>
                <button type="button" class="btn btn-outline-warning">Warning</button>
                <button type="button" class="btn btn-outline-info">Info</button>
                <button type="button" class="btn btn-outline-light">Light</button>
                <button type="button" class="btn btn-outline-dark">Dark</button>
            </div>
        </div>

        <!-- Sizes -->
        <div class="button-group-wrapper">
            <h6 class="mb-3 text-secondary small text-uppercase fw-bold">Tamaños</h6>
            <div class="button-subset">
                <button type="button" class="btn btn-primary btn-lg">Large Button</button>
                <button type="button" class="btn btn-primary btn-sm">Small Button</button>
            </div>
        </div>

        <!-- States -->
        <div class="button-group-wrapper">
            <h6 class="mb-3 text-secondary small text-uppercase fw-bold">Estados</h6>
            <div class="button-subset">
                <button type="button" class="btn btn-primary" disabled>Disabled</button>
                <button type="button" class="btn btn-primary active">Active State</button>
            </div>
        </div>

        <!-- With Icons & FAB -->
        <div class="button-group-wrapper">
            <h6 class="mb-3 text-secondary small text-uppercase fw-bold">Iconos & FAB</h6>
            <div class="button-subset">
                <button type="button" class="btn btn-primary">
                    <i class="bi bi-cloud-arrow-down-fill me-2"></i>Descargar
                </button>
                <button type="button" class="btn btn-dark btn-fab">
                    <i class="bi bi-plus-lg fs-4"></i>
                </button>
                <button type="button" class="btn btn-danger btn-fab">
                    <i class="bi bi-trash-fill fs-5"></i>
                </button>
            </div>
        </div>

        <!-- Button Groups -->
        <div class="button-group-wrapper">
            <h6 class="mb-3 text-secondary small text-uppercase fw-bold">Grupos de Botones</h6>
            <div class="btn-group" role="group" aria-label="Basic example">
                <button type="button" class="btn btn-primary">Left</button>
                <button type="button" class="btn btn-primary">Middle</button>
                <button type="button" class="btn btn-primary">Right</button>
            </div>
        </div>
    </div>
</section>
